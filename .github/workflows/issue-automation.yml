name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage issue and manage labels
        uses: actions/github-script@v7
        with:
          script: |
            // Define required labels with their descriptions
            const requiredLabels = [
              // Category Labels
              { name: 'bug', description: 'Something isn\'t working' },
              { name: 'enhancement', description: 'New feature or request' },
              { name: 'epic', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', description: 'Maintenance and housekeeping tasks' },
              // Priority Labels
              { name: 'priority-critical', description: 'Critical priority issue' },
              { name: 'priority-high', description: 'High priority issue' },
              { name: 'priority-medium', description: 'Medium priority issue' },
              { name: 'priority-low', description: 'Low priority issue' },
              // Status Labels
              { name: 'needs-triage', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', description: 'Issue created by first-time contributor' }
            ];

            // Create missing labels
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    description: label.description,
                    color: 'ffffff'
                  });
                } else {
                  console.error(`Error checking/creating label ${label.name}:`, err);
                  throw err;
                }
              }
            }

            // Get issue data
            const issue = context.payload.issue;
            const titleLower = issue.title.toLowerCase();
            const bodyLower = issue.body ? issue.body.toLowerCase() : '';
            const currentLabels = issue.labels.map(l => l.name.toLowerCase());

            // Add initial needs-triage label
            if (!currentLabels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
            }

            // Assign category labels based on title
            const categoryLabels = [];
            if (titleLower.includes('bug')) categoryLabels.push('bug');
            if (titleLower.includes('epic')) categoryLabels.push('epic');
            if (titleLower.includes('maintenance')) categoryLabels.push('maintenance');

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: categoryLabels
              });
            }

            // Assign priority labels (highest priority first)
            let priorityLabel = 'priority-medium'; // Default

            // Check for critical priority keywords
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const hasCritical = criticalKeywords.some(keyword => titleLower.includes(keyword) || bodyLower.includes(keyword));
            
            if (hasCritical) {
              priorityLabel = 'priority-critical';
            } else {
              // Check for high priority keywords
              const highKeywords = ['important', 'high', 'blocking'];
              const hasHigh = highKeywords.some(keyword => titleLower.includes(keyword) || bodyLower.includes(keyword));
              
              if (hasHigh) {
                priorityLabel = 'priority-high';
              } else {
                // Check for low priority keywords
                const lowKeywords = ['low', 'nice-to-have', 'minor'];
                const hasLow = lowKeywords.some(keyword => titleLower.includes(keyword) || bodyLower.includes(keyword));
                
                if (hasLow) {
                  priorityLabel = 'priority-low';
                }
              }
            }

            // Add priority label if not already present
            if (!currentLabels.includes(priorityLabel.toLowerCase())) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [priorityLabel]
              });
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    if: ${{ contains(github.event.issue.labels.*.name, 'epic') }}
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const parentTitle = issue.title;

            // Define subtask details
            const subtasks = [
              { number: 1, name: 'Requirements Analysis' },
              { number: 2, name: 'Design and Architecture' },
              { number: 3, name: 'Implementation' },
              { number: 4, name: 'Testing and Documentation' }
            ];

            // Create subtasks and collect their issue numbers
            const subtaskNumbers = [];
            for (const task of subtasks) {
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${task.number}: ${task.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              try {
                const createdSubtask = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: subtaskTitle,
                  body: subtaskBody,
                  labels: ['enhancement', 'needs-review']
                });
                subtaskNumbers.push(createdSubtask.data.number);
              } catch (err) {
                console.error(`Error creating subtask ${task.name}:`, err);
                throw err;
              }
            }

            // Update parent issue with Epic Tasks checklist
            const checklistItems = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const updatedBody = (issue.body || '') + `\n\n## Epic Tasks\n${checklistItems}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    if: ${{ always() }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process auto-response and finalize issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const issueNumber = issue.number;
            const currentLabels = issue.labels.map(l => l.name.toLowerCase());

            // Check if this is the author's first issue in the repository
            const authorIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });
            const isFirstIssue = authorIssues.data.length === 1;

            // Add first-time-contributor label if applicable
            if (isFirstIssue && !currentLabels.includes('first-time-contributor')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }

            // Prepare response comment
            let commentContent = '';

            // Add welcome message for first-time contributors
            if (isFirstIssue) {
              commentContent += '👋 Welcome! This is your first issue in this repository. Thank you for contributing!\n\n';
            }

            // Add type-specific guidelines
            if (currentLabels.includes('bug')) {
              commentContent += '### Bug Report Guidelines\n' +
                'To help us resolve this bug quickly, please ensure you have provided:\n' +
                '- A clear, specific description of the bug\n' +
                '- Step-by-step instructions to reproduce the issue\n' +
                '- Comparison of expected behavior vs actual behavior\n' +
                '- Any relevant screenshots, error messages, or environment details\n';
            } else if (currentLabels.includes('epic')) {
              commentContent += '### Feature Request Process\n' +
                'This epic has been automatically broken down into 4 subtasks that will follow our standard feature development process:\n' +
                '1. Requirements Analysis\n' +
                '2. Design and Architecture\n' +
                '3. Implementation\n' +
                '4. Testing and Documentation\n' +
                'Please review the subtasks and provide any additional requirements or feedback!\n';
            } else if (currentLabels.includes('maintenance')) {
              commentContent += '### Maintenance Guidelines\n' +
                'For this maintenance task, please include:\n' +
                '- Clear scope of what needs to be maintained/cleaned up\n' +
                '- Any specific areas or files to focus on\n' +
                '- Expected outcomes or improvements after completion\n';
            }

            // Post the comment if there's content
            if (commentContent) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: commentContent
              });
            }

            // Assign milestone for high/critical priority issues
            if (currentLabels.includes('priority-high') || currentLabels.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists, create if missing
              let milestoneId;
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all'
              });

              const existingMilestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (existingMilestone) {
                milestoneId = existingMilestone.number;
              } else {
                const createdMilestone = await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'v1.0.0',
                  description: 'Milestone for version 1.0.0 features and fixes'
                });
                milestoneId = createdMilestone.data.number;
              }

              // Assign the milestone
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                milestone: milestoneId
              });
            }

            // Update status: move from needs-triage to needs-review
            if (currentLabels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'needs-triage'
              });
            }

            if (!currentLabels.includes('needs-review')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-review']
              });
            }